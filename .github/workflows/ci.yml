name: CI

on:
  push:
    branches: 
        - main
        - feature/*
        - hf/*
        - release/*
  pull_request:
    branches: 
        - main
        - feature/*
        - hf/*
        - release/*

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - &checkout_step
        name: Checkout
        uses: actions/checkout@v6

      - &validate_branch_step
        name: Validate GitLab Flow branch name
        shell: bash
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail

          case "$BRANCH_NAME" in
            main|develop|feature/*|release/*|hotfix/*)
              echo "Branch '$BRANCH_NAME' matches the GitLab Flow policy."
              ;;
            *)
              echo "Branch '$BRANCH_NAME' does not match the GitLab Flow policy."
              echo "Allowed names: main, develop, feature/*, release/*, hotfix/*"
              exit 1
              ;;
          esac

      - &setup_uv_step
        name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
            enable-cache: true

      - &install_dependencies_step
        name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest -m "not integration"

  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - *checkout_step
      - *validate_branch_step
      - *setup_uv_step
      - *install_dependencies_step

      - name: Run integration tests
        run: uv run pytest -m integration >> $GITHUB_STEP_SUMMARY
